<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
<style>
	.bg { fill: #f8fafc; }
	.title { font: 700 38px Arial, sans-serif; fill: #0f172a; letter-spacing: 4px; }
	.subtitle { font: 400 21px Arial, sans-serif; fill: #475569; letter-spacing: 0.5px; }
	.module-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2.2; filter: drop-shadow(0 10px 16px rgba(15, 23, 42, 0.10)); }
	.module-code-box { fill: #020617; }
	.module-code { font: 700 18px Arial, sans-serif; fill: #ffffff; }
	.module-title { font: 700 20px Arial, sans-serif; fill: #111827; }
	.module-line { font: 500 17px Arial, sans-serif; fill: #24324a; }
	.nested-line { font: 400 15px Arial, sans-serif; fill: #475569; }
	.connector { fill: none; stroke: #0f766e; stroke-width: 3; stroke-dasharray: 10 8; opacity: 0.64; }
	.connector-label { font: 700 14px Arial, sans-serif; fill: #0f766e; }
</style>
<rect width="1800" height="1180" class="bg"/>
<text x="60" y="58" class="title">MODELO FISICO POSTGRESQL</text>
<text x="60" y="94" class="subtitle">Resumen verificable de entidades persistentes por modulo y relaciones clave del flujo de pedidos.</text>

<path d="M 255 440 C 905 440, 905 130, 1555 130" class="connector"/>
<text x="857" y="273" class="connector-label">cliente/comercial</text>

<path d="M 1135 440 C 1345 440, 1345 130, 1555 130" class="connector"/>
<text x="1297" y="273" class="connector-label">producto/color</text>

<path d="M 1555 630 C 1555 630, 1555 700, 1555 700" class="connector"/>
<text x="1507" y="653" class="connector-label">estado logistico</text>

<path d="M 1135 700 C 1252.5 700, 1252.5 880, 1370 880" class="connector"/>
<text x="1204.5" y="778" class="connector-label">cargo agencia</text>

<path d="M 695 700 C 1032.5 700, 1032.5 940, 1370 940" class="connector"/>
<text x="984.5" y="808" class="connector-label">notificaciones</text>

<g>
	<rect x="60" y="130" width="390" height="310" rx="18" class="module-box"/>
	<rect x="82" y="152" width="56" height="40" rx="12" class="module-code-box"/>
	<text x="110" y="179" text-anchor="middle" class="module-code">M1</text>
