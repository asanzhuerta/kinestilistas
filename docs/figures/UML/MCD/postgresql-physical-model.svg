<g>
	<rect x="500" y="520" width="390" height="330" rx="18" class="module-box"/>
	<rect x="522" y="542" width="56" height="40" rx="12" class="module-code-box"/>
	<text x="550" y="569" text-anchor="middle" class="module-code">M6</text>
