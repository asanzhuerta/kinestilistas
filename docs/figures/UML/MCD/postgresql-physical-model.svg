	<text x="1398" y="792" class="module-line">clients -&gt; orders</text>
<text x="1398" y="818" class="module-line">commercials -&gt; orders</text>
<text x="1398" y="844" class="module-line">orders -&gt; order_lines</text>
<text x="1398" y="870" class="module-line">orders -&gt; order_deliveries</text>
<text x="1398" y="896" class="module-line">order_deliveries -&gt; commercial_visits</text>
<text x="1398" y="922" class="module-line">order_deliveries -&gt; order_delivery_lines</text>
<text x="1398" y="948" class="module-line">orders -&gt; order_payments</text>
<text x="1398" y="974" class="module-line">system_configurations -&gt; agency fee</text>
