	<rect x="1370" y="700" width="370" height="360" rx="18" class="module-box"/>
	<rect x="1392" y="722" width="56" height="40" rx="12" class="module-code-box"/>
	<text x="1420" y="749" text-anchor="middle" class="module-code">REL</text>
