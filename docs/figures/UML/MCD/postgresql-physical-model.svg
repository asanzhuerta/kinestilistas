<g>
	<rect x="940" y="520" width="390" height="330" rx="18" class="module-box"/>
	<rect x="962" y="542" width="56" height="40" rx="12" class="module-code-box"/>
	<text x="990" y="569" text-anchor="middle" class="module-code">M7</text>
