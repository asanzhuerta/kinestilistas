<text x="1414" y="248" class="nested-line">- client_id, commercial_id</text>
<text x="1414" y="274" class="nested-line">- status_id, payment_status_id</text>
<text x="1414" y="300" class="nested-line">- fulfillment_method, agency_fee</text>
