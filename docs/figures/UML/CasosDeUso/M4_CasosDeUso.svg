<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><style>.h1{font:700 30px Arial,sans-serif;fill:#111827}.subtitle{font:400 15px Arial,sans-serif;fill:#475569}.title{font:700 15px Arial,sans-serif}.row{font:400 13px Arial,sans-serif;fill:#1f2937}.rel{font:700 12px Arial,sans-serif;fill:#334155;paint-order:stroke;stroke:#fff;stroke-width:4px}.uc{font:700 15px Arial,sans-serif;fill:#111827}.actor{font:700 17px Arial,sans-serif;fill:#111827}</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs><rect width="1200" height="760" fill="#fff"/><text x="60" y="58" class="h1">Casos de Uso M4 - Pedidos, repartos y pagos</text><rect x="250" y="105" width="680" height="575" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/><text x="590" y="138" class="subtitle" text-anchor="middle">KinEstilistas - modulo M4</text><g><circle cx="100" cy="235" r="17" fill="#fff" stroke="#0f172a" stroke-width="2"/><path d="M 100 252 L 100 311 M 58 273 L 142 273 M 100 311 L 64 359 M 100 311 L 136 359" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/><text x="100" y="390" class="actor" text-anchor="middle">Cliente profesional</text></g><g><circle cx="100" cy="495" r="17" fill="#fff" stroke="#0f172a" stroke-width="2"/><path d="M 100 512 L 100 571 M 58 533 L 142 533 M 100 571 L 64 619 M 100 571 L 136 619" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/><text x="100" y="650" class="actor" text-anchor="middle">Comercial</text></g><g><circle cx="1070" cy="365" r="17" fill="#fff" stroke="#0f172a" stroke-width="2"/><path d="M 1070 382 L 1070 441 M 1028 403 L 1112 403 M 1070 441 L 1034 489 M 1070 441 L 1106 489" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/><text x="1070" y="520" class="actor" text-anchor="middle">Administrador</text></g><g><ellipse cx="430" cy="205" r